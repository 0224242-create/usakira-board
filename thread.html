<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>スレッド</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#ffffff,#e8dcff);
}

/* コメントエリア */

#comments{
padding:16px;
padding-bottom:110px;
}

.comment{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:14px;
box-shadow:0 3px 6px rgba(0,0,0,0.12);
padding-right:90px; /* ←ここ追加 */
}

.header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
}

.name{
font-weight:bold;
font-size:15px;
}

.time{
font-size:12px;
color:#777;
margin-left:4px;
}

.actions{
margin-left:auto;
display:flex;
gap:5px;
}

.actions button{
font-size:12px;
padding:3px 6px;
}

.text{
font-size:15px;
line-height:1.4;
white-space:pre-wrap;
word-break:break-word;
overflow-wrap:anywhere;
}

.comment img{
max-width:220px;
border-radius:8px;
margin-top:6px;
cursor:pointer;
}

.edit{
font-size:12px;
color:gray;
margin-top:3px;
}

/* 投稿欄 */

#commentBox{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:6px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
display:flex;
align-items:center;
gap:5px;
flex-wrap:wrap;
}

#commentInput{
flex:1;
padding:7px;
font-size:14px;
min-width:150px;
}

#imageInput{
font-size:12px;
}

#fileName{
font-size:12px;
color:#555;
}

#postBtn{
padding:7px 10px;
font-size:13px;
}

#postStatus{
font-size:12px;
color:green;
}

/* URL */

a{
color:#5a4cff;
word-break:break-all;
}

/* 画像拡大 */

#imageModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

#imageModal img{
max-width:90%;
max-height:90%;
}

</style>
</head>

<body>

<div id="comments"></div>

<div id="commentBox">

<input id="commentInput" placeholder="コメントを書くぺこ">

<input type="file" id="imageInput" accept="image/*">

<span id="fileName"></span>

<button id="postBtn">投稿</button>

<span id="postStatus"></span>

</div>

<div id="imageModal" onclick="this.style.display='none'">
<img id="modalImg">
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDwp6403Wctjo-2vjR373CjfJXDDGUp7do",
databaseURL:"https://keijiban-7c651-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const threadId=params.get("id");

const commentsRef=ref(db,"posts/"+threadId);

const defaultName="名もなき兎";
const defaultIcon="usagi.png.jpeg";

const userName=localStorage.getItem("usakira_name")||defaultName;
const userIcon=localStorage.getItem("usakira_icon")||defaultIcon;

/* URLリンク */

function linkify(text){
const urlRegex=/https?:\/\/[^\s]+/g;
return text.replace(urlRegex,url=>{
return `<a href="${url}" target="_blank">${url}</a>`;
});
}

function escapeHtml(str){
if(!str)return "";
return str.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

/* コメント表示 */

function loadComments(){

onValue(commentsRef,snap=>{

const data=snap.val();
let html="";

if(data){

const list=Object.entries(data).sort((a,b)=>b[1].time-a[1].time);

list.forEach(([key,c])=>{

let text=c.text?escapeHtml(c.text):"";
text=linkify(text);

html+=`<div class="comment">

<div class="header">

<img class="icon" src="${c.icon||defaultIcon}">

<div class="name">
${c.name||defaultName}
<span class="time">
${c.time?new Date(c.time).toLocaleString():""}
</span>
</div>

<div class="actions">
<button onclick="editComment('${key}',\`${text}\`)">編集</button>
<button onclick="deleteComment('${key}')">削除</button>
</div>

</div>

<div class="text">${text}</div>

${c.image?`<img src="${c.image}" onclick="openImage('${c.image}')">`:""}

${c.edited?`<div class="edit">編集済み</div>`:""}

</div>`;

});

}

document.getElementById("comments").innerHTML=html;

});

}

/* 画像圧縮 */

function compressImage(file){

return new Promise(resolve=>{

const img=new Image();
const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

img.onload=()=>{

let w=img.width;
let h=img.height;

const max=1000;

if(w>h){
if(w>max){
h*=max/w;
w=max;
}
}else{
if(h>max){
w*=max/h;
h=max;
}
}

canvas.width=w;
canvas.height=h;

ctx.drawImage(img,0,0,w,h);

canvas.toBlob(blob=>{
resolve(blob);
},"image/jpeg",0.7);

};

img.src=URL.createObjectURL(file);

});

}

/* 画像アップロード */

async function uploadImage(file){

const compressed=await compressImage(file);

const formData=new FormData();
formData.append("file",compressed);
formData.append("upload_preset","usakira_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dfhevulda/image/upload",
{method:"POST",body:formData}
);

const data=await res.json();
return data.secure_url;

}

/* 投稿 */

document.getElementById("postBtn").onclick=async()=>{

const text=document.getElementById("commentInput").value.trim();
const file=document.getElementById("imageInput").files[0];

if(!text && !file){
alert("コメントか画像を入れてください");
return;
}

let imageURL="";

if(file){
imageURL=await uploadImage(file);
}

await push(commentsRef,{
text:text,
image:imageURL,
time:Date.now(),
edited:false,
name:userName,
icon:userIcon
});

document.getElementById("commentInput").value="";
document.getElementById("imageInput").value="";
document.getElementById("fileName").textContent="";

document.getElementById("postStatus").textContent="投稿しました！";

setTimeout(()=>{
document.getElementById("postStatus").textContent="";
},2000);

};

/* ファイル名表示 */

document.getElementById("imageInput").onchange=e=>{
const file=e.target.files[0];
document.getElementById("fileName").textContent=file?file.name:"";
};

/* 編集 */

window.editComment=(key,oldText)=>{

const newText=prompt("編集",oldText);

if(newText!==null){

update(ref(db,"posts/"+threadId+"/"+key),{
text:newText,
edited:true
});

}

};

/* 削除 */

window.deleteComment=(key)=>{

if(confirm("削除する？")){
remove(ref(db,"posts/"+threadId+"/"+key));
}

};

/* 画像拡大 */

window.openImage=(src)=>{
document.getElementById("modalImg").src=src;
document.getElementById("imageModal").style.display="flex";
};

loadComments();

</script>

</body>
</html>
