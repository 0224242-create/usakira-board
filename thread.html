<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>スレッド</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#ffffff,#e8dcff);
}

#comments{
padding:16px;
padding-bottom:95px;
}

/* コメント */

.comment{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:14px;
box-shadow:0 3px 6px rgba(0,0,0,0.12);
}

.header{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
}

.icon{
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
}

.name{
font-weight:bold;
font-size:15px;
}

.time{
font-size:12px;
color:#777;
margin-left:4px;
}

/* ボタン */

.actions{
margin-left:auto;
display:flex;
gap:4px;
}

.actions button{
font-size:12px;
padding:3px 6px;
}

/* 本文 */

.text{
word-break:break-word;
font-size:15px;
line-height:1.4;
}

.comment img{
max-width:220px;
border-radius:8px;
margin-top:6px;
}

.edit{
font-size:12px;
color:gray;
margin-top:3px;
}

/* 投稿欄 */

#commentBox{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:6px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
display:flex;
align-items:center;
gap:5px;
}

#commentInput{
flex:1;
padding:7px;
font-size:14px;
}

#imageInput{
width:95px;
font-size:11px;
}

#postBtn{
padding:7px 10px;
font-size:13px;
}

a{
color:#5a4cff;
word-break:break-all;
}

</style>
</head>

<body>

<div id="comments"></div>

<div id="commentBox">
<input id="commentInput" placeholder="コメントを書くぺこ">
<input type="file" id="imageInput" accept="image/*">
<button id="postBtn">投稿</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDwp6403Wctjo-2vjR373CjfJXDDGUp7do",
databaseURL:"https://keijiban-7c651-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const params=new URLSearchParams(location.search);
const threadId=params.get("id");

const commentsRef=ref(db,"posts/"+threadId);

const defaultName="名もなき兎";
const defaultIcon="usagi.png.jpeg";

const userName=localStorage.getItem("usakira_name")||defaultName;
const userIcon=localStorage.getItem("usakira_icon")||defaultIcon;

/* URLリンク化 */

function linkify(text){

const urlRegex=/https?:\/\/[^\s]+/g;

return text.replace(urlRegex,url=>{
return `<a href="${url}" target="_blank">${url}</a>`;
});

}

function escapeHtml(str){
if(!str)return "";
return str.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function loadComments(){

onValue(commentsRef,snap=>{

const data=snap.val();
let html="";

if(data){

const list=Object.entries(data).sort((a,b)=>b[1].time-a[1].time);

list.forEach(([key,c])=>{

let text=c.text?escapeHtml(c.text):"";
text=linkify(text);

html+=`<div class="comment">

<div class="header">

<img class="icon" src="${c.icon||defaultIcon}" onerror="this.src='${defaultIcon}'">

<div class="name">
${c.name||defaultName}
<span class="time">
${c.time?new Date(c.time).toLocaleString():""}
</span>
</div>

<div class="actions">

<button onclick="editComment('${key}',\`${text}\`)">編集</button>
<button onclick="deleteComment('${key}')">削除</button>

</div>

</div>

<div class="text">${text}</div>

${c.image?`<img src="${c.image}">`:""}

${c.edited?`<div class="edit">編集済み</div>`:""}

</div>`;

});

}

document.getElementById("comments").innerHTML=html;

});

}

async function uploadImage(file){

const formData=new FormData();
formData.append("file",file);
formData.append("upload_preset","usakira_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dfhevulda/image/upload",
{method:"POST",body:formData}
);

const data=await res.json();
return data.secure_url;

}

document.getElementById("postBtn").onclick=async()=>{

const text=document.getElementById("commentInput").value.trim();
const file=document.getElementById("imageInput").files[0];

if(!text && !file){
alert("コメントか画像を入れてください");
return;
}

let imageURL="";

if(file){
imageURL=await uploadImage(file);
}

push(commentsRef,{
text:text,
image:imageURL,
time:Date.now(),
edited:false,
name:userName,
icon:userIcon
});

document.getElementById("commentInput").value="";
document.getElementById("imageInput").value="";

};

window.editComment=(key,oldText)=>{

const newText=prompt("編集",oldText);

if(newText!==null){

update(ref(db,"posts/"+threadId+"/"+key),{
text:newText,
edited:true
});

}

};

window.deleteComment=(key)=>{

if(confirm("削除する？")){

remove(ref(db,"posts/"+threadId+"/"+key));

}

};

loadComments();

</script>

</body>
</html>
