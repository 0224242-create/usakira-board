<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>スレッド</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:linear-gradient(#ffffff,#e8dcff);
}

#comments{
padding:15px;
padding-bottom:120px;
}

.comment{
background:white;
border-radius:10px;
padding:10px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.comment img{
max-width:200px;
border-radius:8px;
margin-top:5px;
}

.edit{
font-size:12px;
color:gray;
}

#commentBox{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:10px;
box-shadow:0 -2px 5px rgba(0,0,0,0.1);
display:flex;
gap:5px;
}

#commentInput{
flex:1;
padding:8px;
}

</style>
</head>

<body>

<div id="comments"></div>

<div id="commentBox">
<input id="commentInput" placeholder="コメントを書くぺこ">
<input type="file" id="imageInput" accept="image/*">
<button onclick="postComment()">投稿</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDwp6403Wctjo-2vjR373CjfJXDDGUp7do",
  authDomain: "keijiban-7c651.firebaseapp.com",
  databaseURL: "https://keijiban-7c651-default-rtdb.firebaseio.com",
  projectId: "keijiban-7c651",
  storageBucket: "keijiban-7c651.firebasestorage.app",
  messagingSenderId: "342192640264",
  appId: "1:342192640264:web:a004a725b470741aaf1cbd"
};


firebase.initializeApp(firebaseConfig);

const params=new URLSearchParams(location.search);
const threadId=params.get("id");

const commentsRef=firebase.database().ref("comments/"+threadId);

function loadComments(){

commentsRef.on("value",snap=>{

const data=snap.val();
let html="";

if(data){

const list=Object.entries(data).sort((a,b)=>b[1].time-a[1].time);

list.forEach(([key,c])=>{

const text = c.text ? escapeHtml(c.text) : "";

html+=`<div class="comment">

<div>${text}</div>

${c.image?`<img src="${c.image}">`:""}

${c.edited?`<div class="edit">編集済み</div>`:""}

<button onclick="editComment('${key}',\`${text}\`)">編集</button>

</div>`;

});

}

document.getElementById("comments").innerHTML=html;

});

}

function escapeHtml(str){

if(!str) return "";

return str
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

async function uploadImage(file){

const formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","usakira_upload");

const res=await fetch(
"https://api.cloudinary.com/v1_1/dfhevulda/image/upload",
{
method:"POST",
body:formData
});

const data=await res.json();

return data.secure_url;

}

async function postComment(){

const text=document.getElementById("commentInput").value.trim();
const file=document.getElementById("imageInput").files[0];

if(!text && !file){
alert("コメントか画像を入れてください");
return;
}

let imageURL="";

if(file){
imageURL=await uploadImage(file);
}

const commentData={
text:text,
image:imageURL,
time:Date.now(),
edited:false
};

commentsRef.push(commentData);

document.getElementById("commentInput").value="";
document.getElementById("imageInput").value="";

}

function editComment(key,oldText){

const newText=prompt("編集",oldText);

if(newText!==null){

commentsRef.child(key).update({
text:newText,
edited:true
});

}

}

loadComments();

</script>

</body>
</html>
