<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<h1 class="title">🐰うさ★キラ掲示板✨️</h1>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>.title{
font-size:2.4rem;
font-weight:bold;
color:white;
-webkit-text-stroke:2px #9b8cff;
text-shadow:0 0 8px #dcd6ff;
text-align:center;
}


body{
font-family:"Hiragino Kaku Gothic ProN",sans-serif;
background:linear-gradient(180deg,#ffffff,#f2edff);
padding:20px;
color:#222
}

button{
padding:6px 10px;
margin:4px;
border-radius:6px;
cursor:pointer
}

input,textarea{
padding:6px;
margin:4px 0;
width:100%;
box-sizing:border-box;
border-radius:6px;
border:1px solid #ccc
}

.thread{
border:2px solid #dcd6ff;
background:#fff;
border-radius:14px;
padding:14px;
margin:14px 0;
position:relative
}

.thread.locked{
background:#eee;
border-color:#aaa
}

.flex{
display:flex;
align-items:center;
gap:10px
}

.icon{
width:48px;
height:48px;
border-radius:50%;
border:2px solid #dcd6ff;
object-fit:cover
}

.thread h3 a{
color:#7a6cff;
font-weight:bold;
text-decoration:none;
cursor:pointer
}

.meta{
font-size:0.85rem;
color:#777
}

.deleteThreadBtn{
position:absolute;
right:10px;
top:10px;
background:#c9bfff;
border:none;
color:white;
font-size:0.75rem
}

</style>
</head>
<body>
<h3>プロフィール</h3>

<input id="nameInput" placeholder="名前">
<input id="iconInput" placeholder="アイコンURL">
<button id="saveProfileBtn">保存</button>

<hr>

<h2>スレッド作成</h2>

<input id="threadTitle" placeholder="タイトル">
<textarea id="threadBody" placeholder="本文（任意）"></textarea>
<input id="threadPass" placeholder="鍵スレのパスワード（任意）">

<button id="createThreadBtn">スレッドを作る</button>

<hr>

<h2>スレッド一覧</h2>

<div id="threadsBox">読み込み中…</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDwp6403Wctjo-2vjR373CjfJXDDGUp7do",
databaseURL:"https://keijiban-7c651-default-rtdb.firebaseio.com"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const defaultName="名もなき兎";
const defaultIcon="usagi.png.jpeg";

let userId=localStorage.getItem("usakira_userId");

if(!userId){
userId="user_"+Math.random().toString(36).slice(2);
localStorage.setItem("usakira_userId",userId);
}

const nameInput=document.getElementById("nameInput");
const iconInput=document.getElementById("iconInput");

nameInput.value=localStorage.getItem("usakira_name")||defaultName;
iconInput.value=localStorage.getItem("usakira_icon")||defaultIcon;

document.getElementById("saveProfileBtn").onclick=()=>{
localStorage.setItem("usakira_name",nameInput.value);
localStorage.setItem("usakira_icon",iconInput.value);
alert("保存したよ 🐰");
};

document.getElementById("createThreadBtn").onclick=async()=>{

const title=document.getElementById("threadTitle").value.trim();

if(!title) return alert("タイトルを書いてね");

const newRef=await push(ref(db,"threads"),{

title:title,
body:document.getElementById("threadBody").value,
pass:document.getElementById("threadPass").value||null,

ownerId:userId,
ownerName:nameInput.value||defaultName,
ownerIcon:iconInput.value||defaultIcon,

time:Date.now()

});

location.href="thread.html?id="+newRef.key;

};

const threadsBox=document.getElementById("threadsBox");

onValue(ref(db,"threads"),snap=>{

threadsBox.innerHTML="";

const data=snap.val();

if(!data){
threadsBox.innerHTML="<p>まだスレがないよ 🐰</p>";
return;
}

Object.entries(data)

.sort((a,b)=>b[1].time-a[1].time)

.forEach(([id,t])=>{

const div=document.createElement("div");

div.className="thread"+(t.pass?" locked":"");

div.innerHTML=`

<div class="flex">

<img class="icon" src="${t.ownerIcon||defaultIcon}" onerror="this.src='${defaultIcon}'">

<div>

<h3><a>${t.title}</a> ${t.pass?"🔒":""}</h3>

<div class="meta">by ${t.ownerName}</div>

</div>

</div>

`;

div.querySelector("a").onclick=()=>{

if(t.pass){

const pw=prompt("このスレは鍵付きだよ 🔒");

if(pw!==t.pass){
alert("パスワードが違うよ");
return;
}

}

location.href="thread.html?id="+id;

};

if(t.ownerId===userId){

const delBtn=document.createElement("button");

delBtn.textContent="削除";

delBtn.className="deleteThreadBtn";

delBtn.onclick=async()=>{

if(confirm("このスレを削除する？（投稿も全部消える）")){

await remove(ref(db,"threads/"+id));

await remove(ref(db,"posts/"+id));

}

};

div.appendChild(delBtn);

}

threadsBox.appendChild(div);

});

});

</script>
</body>
</html>
